<!DOCTYPE html>
<html>
<head>
    <title>WebSSH</title>
    <!-- Local Fallback Assets -->
    <link rel="stylesheet" href="/static/css/xterm.css" onerror="this.href='https://cdn.jsdelivr.net/npm/xterm@5.1.0/css/xterm.css'" />
    <script src="/static/js/xterm.js" onerror="this.src='https://cdn.jsdelivr.net/npm/xterm@5.1.0/lib/xterm.js'"></script>
    <script src="/static/js/socket.io.min.js" onerror="this.src='https://cdn.socket.io/4.5.4/socket.io.min.js'"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #terminal { height: calc(100vh - 20px); width: 100vw; background: #000; z-index: 1; }
        
        /* URL Overlay Window */
        #url-overlay {
            display: none;
            position: fixed;
            top: 50px;
            right: 30px;
            width: 600px;
            height: 450px;
            z-index: 2000;
            background: white;
            border: 3px solid #0a84ff;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,1);
            overflow: hidden;
            flex-direction: column;
            min-width: 200px;
            min-height: 150px;
        }
        /* Resizer Handles */
        .resizer {
            position: absolute;
            z-index: 2002;
            background: transparent;
        }
        .resizer.n { top: 0; left: 0; right: 0; height: 5px; cursor: ns-resize; }
        .resizer.s { bottom: 0; left: 0; right: 0; height: 5px; cursor: ns-resize; }
        .resizer.e { top: 0; right: 0; bottom: 0; width: 5px; cursor: ew-resize; }
        .resizer.w { top: 0; left: 0; bottom: 0; width: 5px; cursor: ew-resize; }
        .resizer.nw { top: 0; left: 0; width: 10px; height: 10px; cursor: nwse-resize; }
        .resizer.ne { top: 0; right: 0; width: 10px; height: 10px; cursor: nesw-resize; }
        .resizer.sw { bottom: 0; left: 0; width: 10px; height: 10px; cursor: nesw-resize; }
        .resizer.se { bottom: 0; right: 0; width: 15px; height: 15px; cursor: nwse-resize; background: #0a84ff; clip-path: polygon(100% 0, 100% 100%, 0 100%); }

        /* Shield to prevent iframe stealing mouse events */
        #overlay-shield {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 2001;
            background: transparent;
        }
        #overlay-header {
            background: #222;
            color: #ddd;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            font-size: 12px;
            user-select: none;
        }
        #header-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        #overlay-iframe {
            flex-grow: 1;
            border: none;
            width: 100%;
            height: calc(100% - 35px);
            background: white;
        }
        .header-btn {
            background: #444;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 2px 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
        }
        .header-btn:hover { background: #666; }
        #close-overlay { background: #ff453a; }
        #close-overlay:hover { background: #ff6b61; }

        /* Custom Context Menu */
        #context-menu {
            display: none;
            position: absolute;
            z-index: 3000;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 5px 0;
            min-width: 200px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            font-size: 13px;
        }
        #context-menu div {
            padding: 8px 15px;
            cursor: pointer;
        }
        #context-menu div:hover {
            background: #0a84ff;
        }
        #context-menu .disabled {
            color: #777;
            cursor: default;
        }
        
        #controls { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            z-index: 100; background: #222; padding: 30px; 
            border-radius: 8px; color: white; border: 1px solid #444;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 300px;
        }
        #controls h2 { margin-top: 0; color: #0a84ff; font-size: 1.2rem; }
        #controls input { 
            display: block; width: 100%; margin-bottom: 15px; 
            padding: 10px; background: #333; border: 1px solid #555; 
            color: white; border-radius: 4px; box-sizing: border-box;
        }
        #controls button { 
            width: 100%; padding: 12px; background: #0a84ff; 
            border: none; color: white; border-radius: 4px; 
            cursor: pointer; font-weight: bold;
        }
        #controls button:hover { background: #007aff; }
        #status-bar {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: #111; color: #888; font-size: 12px;
            padding: 2px 10px; z-index: 50; border-top: 1px solid #222;
        }
        .error-msg { color: #ff453a; font-size: 13px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>
    <div id="context-menu">
        <div id="open-overlay-option">Open Selection in Overlay</div>
        <div id="pip-option">Terminal to PiP Window</div>
    </div>
    
    <div id="url-overlay">
        <div id="overlay-shield"></div>
        <div id="overlay-header">
            <span id="overlay-title">Side Browser</span>
            <div id="header-right">
                <button id="external-link" class="header-btn" title="Open in New Tab">↗</button>
                <button id="close-overlay" class="header-btn" title="Close Overlay">×</button>
            </div>
        </div>
        <div style="flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #333; overflow: hidden; position: relative;">
            <iframe id="overlay-iframe" style="width: 100%; height: 100%; border: none; display: none;" src="about:blank"></iframe>
            <img id="overlay-img" style="max-width: 100%; max-height: 100%; object-fit: contain; display: none;" />
        </div>
        <!-- Resizers -->
        <div class="resizer n"></div>
        <div class="resizer s"></div>
        <div class="resizer e"></div>
        <div class="resizer w"></div>
        <div class="resizer nw"></div>
        <div class="resizer ne"></div>
        <div class="resizer sw"></div>
        <div class="resizer se"></div>
    </div>

    <div id="controls">
        <h2>WebSSH Login</h2>
        <div id="errorBox" class="error-msg"></div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="host" placeholder="Host" value="127.0.0.1" style="flex: 3;">
            <input type="text" id="port" placeholder="Port" value="22" style="flex: 1;">
        </div>
        <input type="text" id="username" placeholder="Username" value="aska">
        <input type="password" id="password" placeholder="Password (Optional)">
        <button id="connectBtn">Connect to SSH</button>
    </div>
    
    <div id="terminal"></div>
    <div id="status-bar">Socket: <span id="socketStatus">Disconnected</span></div>

    <script>
        const terminalContainer = document.getElementById('terminal');
        const statusEl = document.getElementById('socketStatus');
        const errorEl = document.getElementById('errorBox');
        
        const term = new Terminal({
            cursorBlink: true,
            theme: { background: '#000000' },
            fontFamily: 'Consolas, "Courier New", monospace',
            fontSize: 14
        });
        term.open(terminalContainer);

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token') || "{{ token }}";
        
        const socket = io({
            query: { token: token },
            reconnectionAttempts: 5,
            timeout: 10000
        });

        socket.on('connect', () => {
            statusEl.innerText = "Connected";
            statusEl.style.color = "#34c759";
        });

        socket.on('disconnect', (reason) => {
            statusEl.innerText = "Disconnected (" + reason + ")";
            statusEl.style.color = "#ff9f0a";
            document.getElementById('controls').style.display = 'block';
        });

        function resize() {
            if (!terminalContainer) return;
            const width = terminalContainer.clientWidth;
            const height = terminalContainer.clientHeight;
            const cols = Math.floor(width / 9); 
            const rows = Math.floor(height / 18);
            if (cols > 0 && rows > 0) {
                term.resize(cols, rows);
                if (socket.connected) {
                    socket.emit('resize', { cols, rows });
                }
            }
        }
        window.addEventListener('resize', resize);

        document.getElementById('connectBtn').onclick = () => {
            errorEl.style.display = 'none';
            const host = document.getElementById('host').value;
            const port = document.getElementById('port').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            socket.emit('start_ssh', { host, port, username, password });
            document.getElementById('connectBtn').innerText = "Connecting...";
            document.getElementById('connectBtn').disabled = true;
        };

        term.onData(data => { if (socket.connected) socket.emit('ssh_input', { data }); });

        socket.on('ssh_output', data => {
            if (data.data.includes('[ERROR]')) {
                errorEl.innerText = data.data.replace('[ERROR]', '').trim();
                errorEl.style.display = 'block';
                document.getElementById('connectBtn').innerText = "Connect to WSL";
                document.getElementById('connectBtn').disabled = false;
            } else {
                if (document.getElementById('controls').style.display !== 'none') {
                    document.getElementById('controls').style.display = 'none';
                    resize();
                    setTimeout(() => term.focus(), 100);
                }
                term.write(data.data);
            }
        });

        // Custom Menu Logic (Triggered by Left-Click on Selection)
        const contextMenu = document.getElementById('context-menu');
        const urlOverlay = document.getElementById('url-overlay');
        const overlayIframe = document.getElementById('overlay-iframe');
        const overlayImg = document.getElementById('overlay-img');
        const openOption = document.getElementById('open-overlay-option');
        
        const IMAGE_EXTENSIONS = ['.jpg', '.jpeg', '.png', '.gif', '.webp', '.svg', '.bmp'];

        // Restore default right-click menu
        window.addEventListener('contextmenu', (e) => {
            // Do NOT preventDefault, allowing native paste menu
            contextMenu.style.display = 'none'; // Hide our custom menu if it was open
        });

        // Show custom menu on LEFT CLICK RELEASE if there is a selection
        window.addEventListener('mouseup', (e) => {
            if (e.button === 0) { // Left Click
                // Small delay to let xterm.js update selection
                setTimeout(() => {
                    const selection = term.getSelection().trim();
                    if (selection && !contextMenu.contains(e.target)) {
                        openOption.classList.remove('disabled');
                        openOption.dataset.url = selection;
                        openOption.innerText = `Open Selection in Overlay`;
                        
                        contextMenu.style.top = `${e.pageY}px`;
                        contextMenu.style.left = `${e.pageX}px`;
                        contextMenu.style.display = 'block';
                    } else if (!contextMenu.contains(e.target)) {
                        contextMenu.style.display = 'none';
                    }
                }, 50);
            } else {
                contextMenu.style.display = 'none';
            }
        });

        // Hide menu when clicking menu items or elsewhere
        contextMenu.addEventListener('click', (e) => {
            e.stopPropagation();
            contextMenu.style.display = 'none';
        });

        openOption.addEventListener('click', () => {
            if (openOption.classList.contains('disabled')) return;
            let url = openOption.dataset.url;
            if (!url.startsWith('http')) url = 'https://' + url;
            
            // Set up external link fallback
            document.getElementById('external-link').onclick = () => window.open(url, '_blank');
            
            // Check if it's an image
            const isImage = IMAGE_EXTENSIONS.some(ext => url.toLowerCase().includes(ext));
            
            if (isImage) {
                overlayIframe.style.display = 'none';
                overlayImg.src = url;
                overlayImg.style.display = 'block';
            } else {
                overlayImg.style.display = 'none';
                overlayIframe.src = url;
                overlayIframe.style.display = 'block';
            }
            urlOverlay.style.display = 'flex';
        });

        document.getElementById('close-overlay').onclick = () => {
            urlOverlay.style.display = 'none';
            overlayIframe.src = 'about:blank';
            overlayImg.src = '';
            overlayIframe.style.display = 'none';
            overlayImg.style.display = 'none';
            // Restore focus to terminal after closing overlay
            setTimeout(() => term.focus(), 100);
        };

        // Ensure clicking on the terminal area always restores focus
        terminalContainer.addEventListener('click', () => {
            if (urlOverlay.style.display !== 'flex') {
                term.focus();
            }
        });

        // Draggable & Resizable Logic
        const header = document.getElementById('overlay-header');
        const shield = document.getElementById('overlay-shield');
        let isDragging = false;
        let isResizing = false;
        let currentResizer = null;
        let startX, startY, startWidth, startHeight, startLeft, startTop;

        // Header dragging
        header.onmousedown = (e) => {
            if (e.target.closest('.header-btn')) return; // Don't drag if clicking buttons
            isDragging = true;
            shield.style.display = 'block';
            startX = e.clientX;
            startY = e.clientY;
            startLeft = urlOverlay.offsetLeft;
            startTop = urlOverlay.offsetTop;
            urlOverlay.style.right = 'auto';
        };

        // Multi-directional Resizing
        document.querySelectorAll('.resizer').forEach(resizer => {
            resizer.onmousedown = (e) => {
                isResizing = true;
                currentResizer = e.target;
                shield.style.display = 'block';
                startX = e.clientX;
                startY = e.clientY;
                startWidth = urlOverlay.clientWidth;
                startHeight = urlOverlay.clientHeight;
                startLeft = urlOverlay.offsetLeft;
                startTop = urlOverlay.offsetTop;
                urlOverlay.style.right = 'auto';
                e.preventDefault();
            };
        });

        window.onmousemove = (e) => {
            if (isDragging) {
                urlOverlay.style.left = `${startLeft + (e.clientX - startX)}px`;
                urlOverlay.style.top = `${startTop + (e.clientY - startY)}px`;
            } else if (isResizing && currentResizer) {
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                const classes = currentResizer.className;

                if (classes.includes('e')) {
                    urlOverlay.style.width = `${startWidth + dx}px`;
                }
                if (classes.includes('w')) {
                    urlOverlay.style.width = `${startWidth - dx}px`;
                    urlOverlay.style.left = `${startLeft + dx}px`;
                }
                if (classes.includes('s')) {
                    urlOverlay.style.height = `${startHeight + dy}px`;
                }
                if (classes.includes('n')) {
                    urlOverlay.style.height = `${startHeight - dy}px`;
                    urlOverlay.style.top = `${startTop + dy}px`;
                }
            }
        };

        window.onmouseup = () => { 
            isDragging = false; 
            isResizing = false; 
            currentResizer = null;
            shield.style.display = 'none'; 
        };

        // Fix button interactions by stopping propagation
        document.getElementById('close-overlay').addEventListener('mousedown', (e) => e.stopPropagation());
        document.getElementById('external-link').addEventListener('mousedown', (e) => e.stopPropagation());

        // Terminal PiP
        document.getElementById('pip-option').addEventListener('click', async () => {
            if (!window.documentPictureInPicture) return alert("PiP not supported.");
            const pipWindow = await window.documentPictureInPicture.requestWindow({ width: 800, height: 480 });
            pipWindow.document.body.append(terminalContainer);
            [...document.styleSheets].forEach((s) => {
                try {
                    const style = document.createElement('style');
                    style.textContent = [...s.cssRules].map((r) => r.cssText).join('');
                    pipWindow.document.head.appendChild(style);
                } catch (e) {
                    const l = document.createElement('link'); l.rel = 'stylesheet'; l.href = s.href;
                    pipWindow.document.head.appendChild(l);
                }
            });
            const r = () => { term.resize(Math.floor(pipWindow.innerWidth / 9), Math.floor(pipWindow.innerHeight / 18)); };
            pipWindow.addEventListener('resize', r);
            pipWindow.addEventListener("pagehide", () => {
                document.body.insertBefore(terminalContainer, document.getElementById('status-bar'));
                resize();
            });
        });

        setTimeout(resize, 500);
    </script>
</body>
</html>
