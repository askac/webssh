<!DOCTYPE html>
<html>
<head>
    <title>WebSSH</title>
    <!-- Local Fallback Assets -->
    <link rel="stylesheet" href="/static/css/xterm.css" onerror="this.href='https://cdn.jsdelivr.net/npm/xterm@5.1.0/css/xterm.css'" />
    <script src="/static/js/xterm.js" onerror="this.src='https://cdn.jsdelivr.net/npm/xterm@5.1.0/lib/xterm.js'"></script>
    <script src="/static/js/socket.io.min.js" onerror="this.src='https://cdn.socket.io/4.5.4/socket.io.min.js'"></script>
    <script src="/static/js/xterm-addon-fit.js" onerror="this.src='https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js'"></script>
    <script src="/static/js/xterm-addon-web-links.js" onerror="this.src='https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js'"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #terminal { height: calc(100vh - 20px); width: 100vw; background: #000; z-index: 1; }

        /* URL Overlay Window */
        #url-overlay {
            display: none;
            position: fixed;
            top: 50px; right: 30px;
            width: 600px; height: 450px;
            z-index: 2000;
            background: white;
            border: 3px solid #0a84ff;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,1);
            overflow: hidden;
            flex-direction: column;
            min-width: 200px; min-height: 150px;
        }
        .resizer { position: absolute; z-index: 2002; background: transparent; }
        .resizer.n { top: 0; left: 0; right: 0; height: 5px; cursor: ns-resize; }
        .resizer.s { bottom: 0; left: 0; right: 0; height: 5px; cursor: ns-resize; }
        .resizer.e { top: 0; right: 0; bottom: 0; width: 5px; cursor: ew-resize; }
        .resizer.w { top: 0; left: 0; bottom: 0; width: 5px; cursor: ew-resize; }
        .resizer.nw { top: 0; left: 0; width: 10px; height: 10px; cursor: nwse-resize; }
        .resizer.ne { top: 0; right: 0; width: 10px; height: 10px; cursor: nesw-resize; }
        .resizer.sw { bottom: 0; left: 0; width: 10px; height: 10px; cursor: nesw-resize; }
        .resizer.se { bottom: 0; right: 0; width: 15px; height: 15px; cursor: nwse-resize; background: #0a84ff; clip-path: polygon(100% 0, 100% 100%, 0 100%); }
        #overlay-shield { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 2001; background: transparent; }
        #overlay-header { background: #222; color: #ddd; padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; cursor: move; font-size: 12px; user-select: none; }
        #header-right { display: flex; gap: 8px; align-items: center; }
        .header-btn { background: #444; color: white; border: none; border-radius: 4px; padding: 2px 8px; cursor: pointer; font-weight: bold; font-size: 11px; }
        .header-btn:hover { background: #666; }
        #close-overlay { background: #ff453a; }
        #close-overlay:hover { background: #ff6b61; }

        /* Context Menu */
        #context-menu {
            display: none;
            position: fixed;
            z-index: 3000;
            background: #2c2c2e;
            color: white;
            border: 1px solid #555;
            border-radius: 6px;
            padding: 4px 0;
            min-width: 210px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            font-size: 13px;
        }
        #context-menu .menu-item {
            padding: 8px 16px;
            cursor: pointer;
        }
        #context-menu .menu-item:hover { background: #0a84ff; }
        #context-menu .menu-item.hidden { display: none; }
        #context-menu .menu-separator { height: 1px; background: #444; margin: 4px 0; }

        /* Settings Modal */
        #settings-modal {
            display: none;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.75);
            z-index: 4000;
            align-items: center; justify-content: center;
        }
        #settings-modal.open { display: flex; }
        .settings-box {
            background: #1c1c1e;
            border: 1px solid #3a3a3c;
            border-radius: 10px;
            width: 500px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            color: #ddd;
            font-size: 13px;
            overflow: hidden;
        }
        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid #3a3a3c;
        }
        .settings-header h3 { margin: 0; color: #0a84ff; font-size: 1rem; font-weight: 600; }
        .settings-body { display: flex; flex: 1; overflow: hidden; }
        .settings-nav {
            width: 120px;
            border-right: 1px solid #3a3a3c;
            padding: 8px 0;
            flex-shrink: 0;
        }
        .settings-nav-item { padding: 9px 16px; cursor: pointer; color: #888; font-size: 13px; }
        .settings-nav-item:hover { color: #fff; background: #2c2c2e; }
        .settings-nav-item.active { color: #0a84ff; background: #2c2c2e; font-weight: 500; }
        .settings-content { flex: 1; padding: 16px 20px; overflow-y: auto; }
        .settings-tab { display: none; }
        .settings-tab.active { display: block; }
        .settings-fieldset {
            border: 1px solid #3a3a3c;
            border-radius: 6px;
            padding: 10px 16px;
            margin-bottom: 14px;
        }
        .settings-fieldset legend { color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; padding: 0 6px; }
        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 7px 0;
            border-bottom: 1px solid #2c2c2e;
        }
        .settings-row:last-child { border-bottom: none; }
        .settings-row label { color: #ddd; cursor: pointer; flex: 1; }
        .settings-row input[type="text"],
        .settings-row input[type="number"],
        .settings-row select {
            background: #2c2c2e; border: 1px solid #555; color: #fff;
            border-radius: 4px; padding: 4px 8px; font-size: 12px; outline: none;
        }
        .settings-row input[type="text"] { width: 190px; }
        .settings-row input[type="number"] { width: 55px; text-align: center; }
        .settings-row select { min-width: 110px; }
        .settings-row input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: #0a84ff; }
        .settings-footer {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 20px; border-top: 1px solid #3a3a3c;
        }
        .settings-btn { padding: 7px 18px; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: 500; }
        #settings-reset { background: #3a3a3c; color: #aaa; }
        #settings-reset:hover { background: #48484a; color: #fff; }
        #settings-save { background: #0a84ff; color: white; }
        #settings-save:hover { background: #007aff; }

        #controls {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100; background: #222; padding: 30px;
            border-radius: 8px; color: white; border: 1px solid #444;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 300px;
        }
        #controls h2 { margin-top: 0; color: #0a84ff; font-size: 1.2rem; }
        #controls input {
            display: block; width: 100%; margin-bottom: 15px;
            padding: 10px; background: #333; border: 1px solid #555;
            color: white; border-radius: 4px; box-sizing: border-box;
        }
        #controls button { width: 100%; padding: 12px; background: #0a84ff; border: none; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #controls button:hover { background: #007aff; }
        #status-bar { position: absolute; bottom: 0; left: 0; right: 0; background: #111; color: #888; font-size: 12px; padding: 2px 10px; z-index: 50; border-top: 1px solid #222; display: flex; align-items: center; gap: 0; }
        #status-bar .sb-sep { margin: 0 8px; color: #444; user-select: none; }
        .error-msg { color: #ff453a; font-size: 13px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>
    <!-- Context Menu -->
    <div id="context-menu">
        <div class="menu-item" id="paste-option">&#x1F4CB; Paste</div>
        <div class="menu-separator"></div>
        <div class="menu-item hidden" id="open-overlay-option">&#x1F517; Open in Overlay</div>
        <div class="menu-item hidden" id="search-google-option">&#x1F50D; Search Google</div>
        <div class="menu-separator" id="menu-sep-sel" style="display:none"></div>
        <div class="menu-item" id="pip-option">&#x29C9; Terminal to PiP</div>
        <div class="menu-item" id="settings-option">&#x2699;&#xFE0F; Settings</div>
    </div>

    <!-- URL Overlay Window -->
    <div id="url-overlay">
        <div id="overlay-shield"></div>
        <div id="overlay-header">
            <span id="overlay-title">Side Browser</span>
            <div id="header-right">
                <button id="external-link" class="header-btn" title="Open in New Tab">&#x2197;</button>
                <button id="close-overlay" class="header-btn" title="Close Overlay">&times;</button>
            </div>
        </div>
        <div style="flex-grow:1; display:flex; align-items:center; justify-content:center; background:#333; overflow:hidden; position:relative;">
            <iframe id="overlay-iframe" style="width:100%; height:100%; border:none; display:none;" src="about:blank"></iframe>
            <img id="overlay-img" style="max-width:100%; max-height:100%; object-fit:contain; display:none;" />
            <div id="overlay-fallback" style="display:none; position:absolute; top:0; left:0; right:0; bottom:0; background:#1a1a1a; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:20px; text-align:center; color:#ddd;">
                <div style="font-size:36px;">&#x26A0;</div>
                <div style="font-size:14px; color:#aaa;">This site refused to connect, or blocked iframe embedding.</div>
                <div id="overlay-fallback-url" style="font-size:11px; color:#555; word-break:break-all; max-width:90%;"></div>
                <button id="overlay-fallback-open" style="background:#0a84ff; color:white; border:none; border-radius:6px; padding:10px 24px; cursor:pointer; font-size:13px; font-weight:bold;">Open in New Tab &#x2197;</button>
            </div>
        </div>
        <div class="resizer n"></div><div class="resizer s"></div>
        <div class="resizer e"></div><div class="resizer w"></div>
        <div class="resizer nw"></div><div class="resizer ne"></div>
        <div class="resizer sw"></div><div class="resizer se"></div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal">
        <div class="settings-box">
            <div class="settings-header">
                <h3>Settings</h3>
                <button class="header-btn" id="settings-close" style="background:#ff453a;">&times;</button>
            </div>
            <div class="settings-body">
                <div class="settings-nav">
                    <div class="settings-nav-item active" data-tab="general">General</div>
                    <div class="settings-nav-item" data-tab="appearance">Appearance</div>
                </div>
                <div class="settings-content">
                    <div class="settings-tab active" id="tab-general">
                        <fieldset class="settings-fieldset">
                            <legend>General</legend>
                            <div class="settings-row">
                                <label for="pref-copyOnSelect">Copy on select</label>
                                <input type="checkbox" id="pref-copyOnSelect">
                            </div>
                            <div class="settings-row">
                                <label for="pref-enablePicPreview">Enable pic preview in overlay</label>
                                <input type="checkbox" id="pref-enablePicPreview">
                            </div>
                            <div class="settings-row">
                                <label for="pref-detectUrls">Detect &amp; linkify URLs</label>
                                <input type="checkbox" id="pref-detectUrls">
                            </div>
                            <div class="settings-row">
                                <label for="pref-urlClickAction">URL click opens in</label>
                                <select id="pref-urlClickAction">
                                    <option value="overlay">Overlay</option>
                                    <option value="newtab">New Tab</option>
                                </select>
                            </div>
                        </fieldset>
                    </div>
                    <div class="settings-tab" id="tab-appearance">
                        <fieldset class="settings-fieldset">
                            <legend>Appearance</legend>
                            <div class="settings-row">
                                <label for="pref-fontFace">Font face</label>
                                <input type="text" id="pref-fontFace">
                            </div>
                            <div class="settings-row">
                                <label for="pref-fontSize">Font size</label>
                                <input type="number" id="pref-fontSize" min="8" max="32">
                            </div>
                        </fieldset>
                    </div>
                </div>
            </div>
            <div class="settings-footer">
                <button class="settings-btn" id="settings-reset">Reset</button>
                <button class="settings-btn" id="settings-save">Save</button>
            </div>
        </div>
    </div>

    <div id="controls">
        <h2>WebSSH Login</h2>
        <div id="errorBox" class="error-msg"></div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="host" placeholder="Host" value="127.0.0.1" style="flex:3;">
            <input type="text" id="port" placeholder="Port" value="22" style="flex:1;">
        </div>
        <input type="text" id="username" placeholder="Username" value="aska">
        <input type="password" id="password" placeholder="Password (Optional)">
        <button id="connectBtn">Connect to SSH</button>
    </div>

    <div id="terminal"></div>
    <div id="status-bar">
        <span>SSH:&nbsp;<span id="socketStatus">Disconnected</span></span>
        <span class="sb-sep">|</span>
        <span id="clock-display"></span>
        <span id="uptime-section" style="display:none"><span class="sb-sep">|</span>connected:&nbsp;<span id="uptime-display"></span></span>
    </div>

    <script>
        // ── Preferences ──────────────────────────────────────────────────
        const PREF_KEY = 'webssh.pref.v1';
        const PREF_DEFAULTS = {
            copyOnSelect: false,
            enablePicPreview: true,
            detectUrls: true,
            urlClickAction: 'overlay',
            fontFace: 'Consolas, "Courier New", monospace',
            fontSize: 14
        };
        function loadPrefs() {
            try { return { ...PREF_DEFAULTS, ...JSON.parse(localStorage.getItem(PREF_KEY)) }; }
            catch (e) { return { ...PREF_DEFAULTS }; }
        }
        function savePrefs(p) { localStorage.setItem(PREF_KEY, JSON.stringify(p)); }
        let prefs = loadPrefs();

        // ── Clock & Uptime ────────────────────────────────────────────────
        let connectedAt = null;
        function formatUptime(secs) {
            const d = Math.floor(secs / 86400);
            const h = Math.floor((secs % 86400) / 3600);
            const m = Math.floor((secs % 3600) / 60);
            const s = secs % 60;
            const hms = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            return d > 0 ? `${d}d ${hms}` : hms;
        }
        function tickClock() {
            const now = new Date();
            document.getElementById('clock-display').innerText = now.toLocaleString();
            if (connectedAt) {
                document.getElementById('uptime-display').innerText = formatUptime(Math.floor((now - connectedAt) / 1000));
            }
        }
        tickClock();
        setInterval(tickClock, 1000);

        // ── Terminal ─────────────────────────────────────────────────────
        const terminalContainer = document.getElementById('terminal');
        const statusEl = document.getElementById('socketStatus');
        const errorEl = document.getElementById('errorBox');

        const term = new Terminal({
            cursorBlink: true,
            theme: { background: '#000000' },
            fontFamily: prefs.fontFace,
            fontSize: prefs.fontSize
        });
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(terminalContainer);

        term.onSelectionChange(() => {
            if (prefs.copyOnSelect) {
                const sel = term.getSelection();
                if (sel) navigator.clipboard.writeText(sel).catch(() => {});
            }
        });

        // ── Web Links Addon ──────────────────────────────────────────────
        let webLinksAddon = null;
        function applyDetectUrls() {
            if (webLinksAddon) { webLinksAddon.dispose(); webLinksAddon = null; }
            if (prefs.detectUrls) {
                webLinksAddon = new WebLinksAddon.WebLinksAddon((event, uri) => {
                    const ctrlClick = event.ctrlKey || event.metaKey;
                    const wantsOverlay = prefs.urlClickAction === 'overlay';
                    if (wantsOverlay !== ctrlClick) {
                        openUrlInOverlay(uri);
                    } else {
                        window.open(uri, '_blank');
                    }
                });
                term.loadAddon(webLinksAddon);
            }
        }
        applyDetectUrls();

        // ── Socket.IO ────────────────────────────────────────────────────
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token') || "{{ token }}";

        const socket = io({
            query: { token: token },
            reconnectionAttempts: 5,
            timeout: 10000
        });

        socket.on('connect', () => { statusEl.innerText = "Connected"; statusEl.style.color = "#34c759"; });
        socket.on('disconnect', (reason) => {
            statusEl.innerText = "Disconnected (" + reason + ")";
            statusEl.style.color = "#ff9f0a";
            document.getElementById('controls').style.display = 'block';
            connectedAt = null;
            document.getElementById('uptime-section').style.display = 'none';
        });

        function resize() {
            fitAddon.fit();
            if (socket.connected) socket.emit('resize', { cols: term.cols, rows: term.rows });
        }
        window.addEventListener('resize', resize);

        document.getElementById('connectBtn').onclick = () => {
            errorEl.style.display = 'none';
            socket.emit('start_ssh', {
                host: document.getElementById('host').value,
                port: document.getElementById('port').value,
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            });
            document.getElementById('connectBtn').innerText = "Connecting...";
            document.getElementById('connectBtn').disabled = true;
        };

        term.onData(data => { if (socket.connected) socket.emit('ssh_input', { data }); });

        socket.on('ssh_output', data => {
            if (data.data.includes('[ERROR]')) {
                errorEl.innerText = data.data.replace('[ERROR]', '').trim();
                errorEl.style.display = 'block';
                document.getElementById('connectBtn').innerText = "Connect to WSL";
                document.getElementById('connectBtn').disabled = false;
            } else {
                if (document.getElementById('controls').style.display !== 'none') {
                    document.getElementById('controls').style.display = 'none';
                    connectedAt = new Date();
                    document.getElementById('uptime-section').style.display = '';
                    resize();
                    setTimeout(() => term.focus(), 100);
                }
                term.write(data.data);
            }
        });

        // ── URL Overlay ──────────────────────────────────────────────────
        const urlOverlay = document.getElementById('url-overlay');
        const overlayIframe = document.getElementById('overlay-iframe');
        const overlayImg = document.getElementById('overlay-img');
        const overlayFallback = document.getElementById('overlay-fallback');
        const overlayFallbackUrl = document.getElementById('overlay-fallback-url');
        const overlayFallbackOpen = document.getElementById('overlay-fallback-open');
        const IMAGE_EXTENSIONS = ['.jpg', '.jpeg', '.png', '.gif', '.webp', '.svg', '.bmp'];
        let iframeLoadTimer = null;

        function showOverlayFallback(url) {
            overlayIframe.style.display = 'none';
            overlayImg.style.display = 'none';
            overlayFallbackUrl.innerText = url;
            overlayFallbackOpen.onclick = () => window.open(url, '_blank');
            overlayFallback.style.display = 'flex';
        }

        function loadUrlInOverlay(url) {
            overlayFallback.style.display = 'none';
            overlayImg.style.display = 'none';
            overlayIframe.style.display = 'block';
            overlayIframe.src = url;
            if (iframeLoadTimer) clearTimeout(iframeLoadTimer);
            iframeLoadTimer = setTimeout(() => showOverlayFallback(url), 10000);
            overlayIframe.onload = () => {
                clearTimeout(iframeLoadTimer);
                try {
                    const href = overlayIframe.contentWindow.location.href;
                    if (!href || href === 'about:blank') showOverlayFallback(url);
                } catch (e) { /* Cross-origin OK */ }
            };
        }

        function openUrlInOverlay(url) {
            if (!url.startsWith('http')) url = 'https://' + url;
            document.getElementById('external-link').onclick = () => window.open(url, '_blank');
            const isImage = IMAGE_EXTENSIONS.some(ext => url.toLowerCase().includes(ext));
            if (isImage) {
                if (!prefs.enablePicPreview) { window.open(url, '_blank'); return; }
                overlayFallback.style.display = 'none';
                overlayIframe.style.display = 'none';
                overlayImg.src = url;
                overlayImg.style.display = 'block';
            } else {
                loadUrlInOverlay(url);
            }
            urlOverlay.style.display = 'flex';
        }

        document.getElementById('close-overlay').onclick = () => {
            if (iframeLoadTimer) clearTimeout(iframeLoadTimer);
            urlOverlay.style.display = 'none';
            overlayIframe.src = 'about:blank';
            overlayIframe.onload = null;
            overlayImg.src = '';
            overlayIframe.style.display = 'none';
            overlayImg.style.display = 'none';
            overlayFallback.style.display = 'none';
            setTimeout(() => term.focus(), 100);
        };

        terminalContainer.addEventListener('click', () => {
            if (urlOverlay.style.display !== 'flex') term.focus();
        });

        // ── Context Menu ─────────────────────────────────────────────────
        const contextMenu = document.getElementById('context-menu');
        const openOverlayOption = document.getElementById('open-overlay-option');
        const searchGoogleOption = document.getElementById('search-google-option');
        const menuSepSel = document.getElementById('menu-sep-sel');

        function showContextMenu(x, y) {
            const sel = term.getSelection().trim();
            const hasSel = !!sel;
            openOverlayOption.classList.toggle('hidden', !hasSel);
            searchGoogleOption.classList.toggle('hidden', !hasSel);
            menuSepSel.style.display = hasSel ? '' : 'none';
            if (hasSel) {
                openOverlayOption.dataset.url = sel;
                searchGoogleOption.dataset.query = sel;
            }
            contextMenu.style.left = `${x}px`;
            contextMenu.style.top = `${y}px`;
            contextMenu.style.display = 'block';
            requestAnimationFrame(() => {
                const r = contextMenu.getBoundingClientRect();
                if (r.right > window.innerWidth) contextMenu.style.left = `${x - r.width}px`;
                if (r.bottom > window.innerHeight) contextMenu.style.top = `${y - r.height}px`;
            });
        }

        window.addEventListener('contextmenu', (e) => {
            if (e.shiftKey) return; // Shift+right-click → native browser menu
            e.preventDefault();
            setTimeout(() => showContextMenu(e.clientX, e.clientY), 50);
        });

        window.addEventListener('mousedown', (e) => {
            if (!contextMenu.contains(e.target)) contextMenu.style.display = 'none';
        });

        contextMenu.addEventListener('click', (e) => { e.stopPropagation(); contextMenu.style.display = 'none'; });

        openOverlayOption.addEventListener('click', () => openUrlInOverlay(openOverlayOption.dataset.url));

        searchGoogleOption.addEventListener('click', () => {
            window.open(`https://www.google.com/search?q=${encodeURIComponent(searchGoogleOption.dataset.query)}`, '_blank');
        });

        document.getElementById('paste-option').addEventListener('click', async () => {
            try {
                const text = await navigator.clipboard.readText();
                if (socket.connected) socket.emit('ssh_input', { data: text });
            } catch (e) {}
        });

        // ── Overlay Drag & Resize ────────────────────────────────────────
        const header = document.getElementById('overlay-header');
        const shield = document.getElementById('overlay-shield');
        let isDragging = false, isResizing = false, currentResizer = null;
        let startX, startY, startWidth, startHeight, startLeft, startTop;

        header.onmousedown = (e) => {
            if (e.target.closest('.header-btn')) return;
            isDragging = true; shield.style.display = 'block';
            startX = e.clientX; startY = e.clientY;
            startLeft = urlOverlay.offsetLeft; startTop = urlOverlay.offsetTop;
            urlOverlay.style.right = 'auto';
        };

        document.querySelectorAll('.resizer').forEach(r => {
            r.onmousedown = (e) => {
                isResizing = true; currentResizer = e.target; shield.style.display = 'block';
                startX = e.clientX; startY = e.clientY;
                startWidth = urlOverlay.clientWidth; startHeight = urlOverlay.clientHeight;
                startLeft = urlOverlay.offsetLeft; startTop = urlOverlay.offsetTop;
                urlOverlay.style.right = 'auto'; e.preventDefault();
            };
        });

        window.onmousemove = (e) => {
            if (isDragging) {
                urlOverlay.style.left = `${startLeft + (e.clientX - startX)}px`;
                urlOverlay.style.top = `${startTop + (e.clientY - startY)}px`;
            } else if (isResizing && currentResizer) {
                const dx = e.clientX - startX, dy = e.clientY - startY, cls = currentResizer.className;
                if (cls.includes('e')) urlOverlay.style.width = `${startWidth + dx}px`;
                if (cls.includes('w')) { urlOverlay.style.width = `${startWidth - dx}px`; urlOverlay.style.left = `${startLeft + dx}px`; }
                if (cls.includes('s')) urlOverlay.style.height = `${startHeight + dy}px`;
                if (cls.includes('n')) { urlOverlay.style.height = `${startHeight - dy}px`; urlOverlay.style.top = `${startTop + dy}px`; }
            }
        };
        window.onmouseup = () => { isDragging = false; isResizing = false; currentResizer = null; shield.style.display = 'none'; };

        document.getElementById('close-overlay').addEventListener('mousedown', (e) => e.stopPropagation());
        document.getElementById('external-link').addEventListener('mousedown', (e) => e.stopPropagation());

        // ── Terminal PiP ─────────────────────────────────────────────────
        document.getElementById('pip-option').addEventListener('click', async () => {
            if (!window.documentPictureInPicture) return alert("PiP not supported.");
            const pipWindow = await window.documentPictureInPicture.requestWindow({ width: 800, height: 480 });
            pipWindow.document.body.append(terminalContainer);
            [...document.styleSheets].forEach((s) => {
                try {
                    const style = document.createElement('style');
                    style.textContent = [...s.cssRules].map((r) => r.cssText).join('');
                    pipWindow.document.head.appendChild(style);
                } catch (e) {
                    const l = document.createElement('link'); l.rel = 'stylesheet'; l.href = s.href;
                    pipWindow.document.head.appendChild(l);
                }
            });
            pipWindow.addEventListener('resize', () => fitAddon.fit());
            pipWindow.addEventListener('pagehide', () => {
                document.body.insertBefore(terminalContainer, document.getElementById('status-bar'));
                resize();
            });
        });

        // ── Settings Modal ───────────────────────────────────────────────
        const settingsModal = document.getElementById('settings-modal');

        function openSettings() {
            document.getElementById('pref-copyOnSelect').checked = prefs.copyOnSelect;
            document.getElementById('pref-enablePicPreview').checked = prefs.enablePicPreview;
            document.getElementById('pref-detectUrls').checked = prefs.detectUrls;
            document.getElementById('pref-urlClickAction').value = prefs.urlClickAction;
            document.getElementById('pref-fontFace').value = prefs.fontFace;
            document.getElementById('pref-fontSize').value = prefs.fontSize;
            settingsModal.classList.add('open');
        }

        function closeSettings() {
            settingsModal.classList.remove('open');
            setTimeout(() => term.focus(), 100);
        }

        document.getElementById('settings-option').addEventListener('click', openSettings);
        document.getElementById('settings-close').addEventListener('click', closeSettings);
        settingsModal.addEventListener('click', (e) => { if (e.target === settingsModal) closeSettings(); });

        document.querySelectorAll('.settings-nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.settings-nav-item').forEach(i => i.classList.remove('active'));
                document.querySelectorAll('.settings-tab').forEach(t => t.classList.remove('active'));
                item.classList.add('active');
                document.getElementById('tab-' + item.dataset.tab).classList.add('active');
            });
        });

        function applyAllPrefs() {
            term.options.fontFamily = prefs.fontFace;
            term.options.fontSize = prefs.fontSize;
            fitAddon.fit();
            applyDetectUrls();
        }

        document.getElementById('settings-reset').addEventListener('click', () => {
            prefs = { ...PREF_DEFAULTS };
            savePrefs(prefs);
            applyAllPrefs();
            closeSettings();
        });

        document.getElementById('settings-save').addEventListener('click', () => {
            prefs.copyOnSelect = document.getElementById('pref-copyOnSelect').checked;
            prefs.enablePicPreview = document.getElementById('pref-enablePicPreview').checked;
            prefs.detectUrls = document.getElementById('pref-detectUrls').checked;
            prefs.urlClickAction = document.getElementById('pref-urlClickAction').value;
            prefs.fontFace = document.getElementById('pref-fontFace').value;
            prefs.fontSize = parseInt(document.getElementById('pref-fontSize').value, 10);
            savePrefs(prefs);
            applyAllPrefs();
            closeSettings();
        });

        setTimeout(resize, 500);
    </script>
</body>
</html>
