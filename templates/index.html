<!DOCTYPE html>
<html>
<head>
    <title>WebSSH</title>
    <!-- Local Fallback Assets -->
    <link rel="stylesheet" href="/static/css/xterm.css" onerror="this.href='https://cdn.jsdelivr.net/npm/xterm@5.1.0/css/xterm.css'" />
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #terminal { height: calc(100vh - 20px); width: 100vw; background: #000; z-index: 1; display: none; }
        
        /* Loading Screen */
        #loader-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; color: #0a84ff; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(10, 132, 255, 0.1);
            border-top: 4px solid #0a84ff; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .progress-container { width: 250px; height: 4px; background: #222; border-radius: 2px; overflow: hidden; margin-bottom: 10px; }
        #progress-bar { width: 0%; height: 100%; background: #0a84ff; transition: width 0.3s ease; }
        #loader-timer { font-size: 12px; color: #555; font-family: monospace; }

        /* URL Overlay Window */
        #url-overlay {
            display: none; position: fixed; top: 50px; right: 30px; width: 600px; height: 450px;
            z-index: 2000; background: white; border: 3px solid #0a84ff; border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,1); overflow: hidden; flex-direction: column;
            min-width: 200px; min-height: 150px;
        }
        .resizer { position: absolute; z-index: 2002; background: transparent; }
        .resizer.n { top: 0; left: 0; right: 0; height: 5px; cursor: ns-resize; }
        .resizer.s { bottom: 0; left: 0; right: 0; height: 5px; cursor: ns-resize; }
        .resizer.e { top: 0; right: 0; bottom: 0; width: 5px; cursor: ew-resize; }
        .resizer.w { top: 0; left: 0; bottom: 0; width: 5px; cursor: ew-resize; }
        .resizer.nw { top: 0; left: 0; width: 10px; height: 10px; cursor: nwse-resize; }
        .resizer.ne { top: 0; right: 0; width: 10px; height: 10px; cursor: nesw-resize; }
        .resizer.sw { bottom: 0; left: 0; width: 10px; height: 10px; cursor: nesw-resize; }
        .resizer.se { bottom: 0; right: 0; width: 15px; height: 15px; cursor: nwse-resize; background: #0a84ff; clip-path: polygon(100% 0, 100% 100%, 0 100%); }
        #overlay-shield { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 2001; background: transparent; }
        #overlay-header { background: #222; color: #ddd; padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; cursor: move; font-size: 12px; user-select: none; }
        #header-right { display: flex; gap: 8px; align-items: center; }
        .header-btn { background: #444; color: white; border: none; border-radius: 4px; padding: 2px 8px; cursor: pointer; font-weight: bold; font-size: 11px; }
        .header-btn:hover { background: #666; }
        #close-overlay { background: #ff453a; }
        #close-overlay:hover { background: #ff6b61; }

        /* Context Menu */
        #context-menu {
            display: none; position: fixed; z-index: 3000; background: #2c2c2e; color: white;
            border: 1px solid #555; border-radius: 6px; padding: 4px 0; min-width: 210px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6); font-size: 13px;
        }
        #context-menu .menu-item { padding: 8px 16px; cursor: pointer; }
        #context-menu .menu-item:hover { background: #0a84ff; }
        #context-menu .menu-item.hidden { display: none; }
        #context-menu .menu-separator { height: 1px; background: #444; margin: 4px 0; }

        /* Settings Modal */
        #settings-modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.75); z-index: 4000; align-items: center; justify-content: center;
        }
        #settings-modal.open { display: flex; }
        .settings-box {
            background: #1c1c1e; border: 1px solid #3a3a3c; border-radius: 10px;
            width: 500px; max-height: 80vh; display: flex; flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9); color: #ddd; font-size: 13px; overflow: hidden;
        }
        .settings-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; border-bottom: 1px solid #3a3a3c; }
        .settings-header h3 { margin: 0; color: #0a84ff; font-size: 1rem; }
        .settings-body { display: flex; flex: 1; overflow: hidden; }
        .settings-nav { width: 120px; border-right: 1px solid #3a3a3c; padding: 8px 0; }
        .settings-nav-item { padding: 9px 16px; cursor: pointer; color: #888; }
        .settings-nav-item:hover { color: #fff; background: #2c2c2e; }
        .settings-nav-item.active { color: #0a84ff; background: #2c2c2e; }
        .settings-content { flex: 1; padding: 16px 20px; overflow-y: auto; }
        .settings-tab { display: none; }
        .settings-tab.active { display: block; }
        .settings-fieldset { border: 1px solid #3a3a3c; border-radius: 6px; padding: 10px 16px; margin-bottom: 14px; }
        .settings-fieldset legend { color: #666; font-size: 10px; text-transform: uppercase; padding: 0 6px; }
        .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #2c2c2e; }
        .settings-row:last-child { border-bottom: none; }
        .settings-row label { flex: 1; color: #ddd; cursor: pointer; }
        .settings-row input, .settings-row select { background: #2c2c2e; border: 1px solid #555; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 12px; outline: none; }
        .settings-footer { display: flex; justify-content: space-between; padding: 12px 20px; border-top: 1px solid #3a3a3c; }
        .settings-btn { padding: 7px 18px; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; }

        /* Controls */
        #controls { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; background: #222; padding: 30px; border-radius: 8px; color: white; border: 1px solid #444; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 300px; }
        #controls h2 { margin-top: 0; color: #0a84ff; font-size: 1.2rem; }
        #controls input { display: block; width: 100%; margin-bottom: 15px; padding: 10px; background: #333; border: 1px solid #555; color: white; border-radius: 4px; box-sizing: border-box; }
        #controls button { width: 100%; padding: 12px; background: #0a84ff; border: none; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #controls button:hover { background: #007aff; }
        
        /* Status Bar */
        #status-bar { position: absolute; bottom: 0; left: 0; right: 0; background: #111; color: #888; font-size: 12px; padding: 2px 10px; z-index: 50; border-top: 1px solid #222; display: flex; align-items: center; }
        .sb-sep { margin: 0 8px; color: #444; user-select: none; }
        .error-msg { color: #ff453a; font-size: 13px; margin-bottom: 10px; display: none; }
        
        /* Quick Settings Button */
        #quick-settings { margin-left: auto; cursor: pointer; opacity: 0.6; transition: opacity 0.2s; padding: 0 5px; }
        #quick-settings:hover { opacity: 1; color: #0a84ff; }
    </style>
</head>
<body>
    <div id="loader-screen">
        <div class="spinner"></div>
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div id="loader-text" style="margin-bottom: 5px;">Initializing WebSSH...</div>
        <div id="loader-timer">0.0s</div>
    </div>

    <div id="context-menu">
        <div class="menu-item" id="paste-option">&#x1F4CB; Paste</div>
        <div class="menu-separator"></div>
        <div class="menu-item hidden" id="open-overlay-option">&#x1F517; Open in Overlay</div>
        <div class="menu-item hidden" id="search-google-option">&#x1F50D; Search Google</div>
        <div class="menu-separator" id="menu-sep-sel" style="display:none"></div>
        <div class="menu-item" id="pip-option">&#x29C9; Terminal to PiP</div>
        <div class="menu-item" id="settings-option">&#x2699;&#xFE0F; Settings</div>
        <div class="menu-separator"></div>
        <div class="menu-item" id="native-menu-option">&#x1F6AA; Use browser context menu</div>
    </div>

    <div id="url-overlay">
        <div id="overlay-shield"></div>
        <div id="overlay-header">
            <span id="overlay-title">Side Browser</span>
            <div id="header-right">
                <button id="external-link" class="header-btn" title="Open in New Tab">&#x2197;</button>
                <button id="close-overlay" class="header-btn" title="Close Overlay">&times;</button>
            </div>
        </div>
        <div style="flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #333; overflow: hidden; position: relative;">
            <iframe id="overlay-iframe" style="width: 100%; height: 100%; border: none; display: none;" src="about:blank"></iframe>
            <img id="overlay-img" style="max-width: 100%; max-height: 100%; object-fit: contain; display: none;" />
            <div id="overlay-fallback" style="display:none; position:absolute; top:0; left:0; right:0; bottom:0; background:#1a1a1a; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:20px; text-align:center; color:#ddd;">
                <div style="font-size:36px;">&#x26A0;</div>
                <div style="font-size:14px; color:#aaa;">Site blocked embedding or refused to connect.</div>
                <div id="overlay-fallback-url" style="font-size:11px; color:#555; word-break:break-all; max-width:90%;"></div>
                <button id="overlay-fallback-open" style="background:#0a84ff; color:white; border:none; border-radius:6px; padding:10px 24px; cursor:pointer; font-size:13px; font-weight:bold;">Open in New Tab &#x2197;</button>
            </div>
        </div>
        <div class="resizer n"></div><div class="resizer s"></div><div class="resizer e"></div><div class="resizer w"></div>
        <div class="resizer nw"></div><div class="resizer ne"></div><div class="resizer sw"></div><div class="resizer se"></div>
    </div>

    <div id="settings-modal">
        <div class="settings-box">
            <div class="settings-header">
                <h3>Settings</h3>
                <button class="header-btn" id="settings-close" style="background:#ff453a;">&times;</button>
            </div>
            <div class="settings-body">
                <div class="settings-nav">
                    <div class="settings-nav-item active" data-tab="general">General</div>
                    <div class="settings-nav-item" data-tab="appearance">Appearance</div>
                </div>
                <div class="settings-content">
                    <div class="settings-tab active" id="tab-general">
                        <fieldset class="settings-fieldset">
                            <legend>General</legend>
                            <div class="settings-row"><label for="pref-useCustomMenu">Enable custom context menu</label><input type="checkbox" id="pref-useCustomMenu"></div>
                            <div class="settings-row"><label for="pref-copyOnSelect">Copy on select</label><input type="checkbox" id="pref-copyOnSelect"></div>
                            <div class="settings-row"><label for="pref-enablePicPreview">Enable pic preview</label><input type="checkbox" id="pref-enablePicPreview"></div>
                            <div class="settings-row"><label for="pref-detectUrls">Detect & linkify URLs</label><input type="checkbox" id="pref-detectUrls"></div>
                            <div class="settings-row"><label for="pref-urlClickAction">URL click opens in</label>
                                <select id="pref-urlClickAction"><option value="overlay">Overlay</option><option value="newtab">New Tab</option></select>
                            </div>
                        </fieldset>
                    </div>
                    <div class="settings-tab" id="tab-appearance">
                        <fieldset class="settings-fieldset">
                            <legend>Appearance</legend>
                            <div class="settings-row"><label for="pref-colorScheme">Color scheme</label>
                                <select id="pref-colorScheme">
                                    <option value="ibm5153">IBM 5153 (CGA Classic)</option>
                                    <option value="vintage">Vintage (CRT Classic)</option>
                                    <option value="campbell">Campbell (Windows Default)</option>
                                    <option value="oneHalfDark">One Half Dark</option>
                                    <option value="solarizedDark">Solarized Dark</option>
                                    <option value="tangoDark">Tango Dark</option>
                                    <option value="blackOnWhite">Black on White</option>
                                </select>
                            </div>
                            <div class="settings-row"><label for="pref-fontFace">Font face</label><input type="text" id="pref-fontFace"></div>
                            <div class="settings-row"><label for="pref-fontSize">Font size</label><input type="number" id="pref-fontSize" min="8" max="32"></div>
                        </fieldset>
                    </div>
                </div>
            </div>
            <div class="settings-footer">
                <button class="settings-btn" id="settings-reset" style="background:#3a3a3c; color:#aaa;">Reset</button>
                <button class="settings-btn" id="settings-save" style="background:#0a84ff; color:white;">Save Changes</button>
            </div>
        </div>
    </div>

    <div id="controls" style="display: none;">
        <h2>WebSSH Login</h2>
        <div id="errorBox" class="error-msg"></div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="host" placeholder="Host" value="127.0.0.1" style="flex: 3;">
            <input type="text" id="port" placeholder="Port" value="22" style="flex: 1;">
        </div>
        <input type="text" id="username" placeholder="Username" value="aska">
        <input type="password" id="password" placeholder="Password (Optional)">
        <button id="connectBtn">Connect to SSH</button>
    </div>
    
    <div id="terminal"></div>
    <div id="status-bar">
        <span>SSH:&nbsp;<span id="socketStatus">Disconnected</span></span>
        <span class="sb-sep">|</span>
        <span id="clock-display"></span>
        <span id="uptime-section" style="display:none"><span class="sb-sep">|</span>connected:&nbsp;<span id="uptime-display"></span></span>
        <div id="quick-settings" title="Settings">&#x2699;&#xFE0F;</div>
    </div>

    <script>
        // --- Color Schemes ---
        const SCHEMES = {
            ibm5153: { background: '#000000', foreground: '#aaaaaa', black: '#000000', red: '#aa0000', green: '#00aa00', yellow: '#aa5500', blue: '#0000aa', magenta: '#aa00aa', cyan: '#00aaaa', white: '#aaaaaa', brightBlack: '#555555', brightRed: '#ff5555', brightGreen: '#55ff55', brightYellow: '#ffff55', brightBlue: '#5555ff', brightMagenta: '#ff55ff', brightCyan: '#55ffff', brightWhite: '#ffffff', cursor: '#aaaaaa' },
            vintage: { background: '#000000', foreground: '#d2d2d2', black: '#000000', red: '#d81e05', green: '#0dcd79', yellow: '#e5e510', blue: '#2472c8', magenta: '#bc3fbc', cyan: '#11a8cd', white: '#e5e5e5', brightBlack: '#666666', brightRed: '#f14c4c', brightGreen: '#23d18b', brightYellow: '#f5f543', brightBlue: '#3b8eea', brightMagenta: '#d670d6', brightCyan: '#29b8db', brightWhite: '#ffffff', cursor: '#adadad' },
            campbell: { background: '#0c0c0c', foreground: '#cccccc', black: '#0c0c0c', red: '#c50f1f', green: '#13a10e', yellow: '#c19c00', blue: '#0037da', magenta: '#881798', cyan: '#3a96dd', white: '#cccccc', brightBlack: '#767676', brightRed: '#e74856', brightGreen: '#16c60c', brightYellow: '#f9f1a5', brightBlue: '#3b78ff', brightMagenta: '#b4009e', brightCyan: '#61d6d6', brightWhite: '#f2f2f2', cursor: '#ffffff' },
            oneHalfDark: { background: '#282c34', foreground: '#dcdfe4', black: '#282c34', red: '#e06c75', green: '#98c379', yellow: '#e5c07b', blue: '#61afef', magenta: '#c678dd', cyan: '#56b6c2', white: '#dcdfe4', brightBlack: '#5c6370', brightRed: '#e06c75', brightGreen: '#98c379', brightYellow: '#e5c07b', brightBlue: '#61afef', brightMagenta: '#c678dd', brightCyan: '#56b6c2', brightWhite: '#ffffff', cursor: '#ffffff' },
            solarizedDark: { background: '#002b36', foreground: '#839496', black: '#073642', red: '#dc322f', green: '#859900', yellow: '#b58900', blue: '#268bd2', magenta: '#d33682', cyan: '#2aa198', white: '#eee8d5', brightBlack: '#002b36', brightRed: '#cb4b16', brightGreen: '#586e75', brightYellow: '#657b83', brightBlue: '#839496', brightMagenta: '#6c71c4', brightCyan: '#93a1a1', brightWhite: '#fdf6e3', cursor: '#93a1a1' },
            tangoDark: { background: '#2e3436', foreground: '#eeeeec', black: '#2e3436', red: '#cc0000', green: '#4e9a06', yellow: '#c4a000', blue: '#3465a4', magenta: '#75507b', cyan: '#06989a', white: '#d3d7cf', brightBlack: '#555753', brightRed: '#ef2929', brightGreen: '#8ae234', brightYellow: '#fce94f', brightBlue: '#729fcf', brightMagenta: '#ad7fa8', brightCyan: '#34e2e2', brightWhite: '#eeeeec', cursor: '#eeeeec' },
            blackOnWhite: { background: '#ffffff', foreground: '#000000', black: '#000000', red: '#cd3131', green: '#00bc74', yellow: '#949800', blue: '#0451a5', magenta: '#bc05bc', cyan: '#0598bc', white: '#555555', brightBlack: '#666666', brightRed: '#cd3131', brightGreen: '#14ce80', brightYellow: '#b5ba00', brightBlue: '#0451a5', brightMagenta: '#bc05bc', brightCyan: '#0598bc', brightWhite: '#a5a5a5', cursor: '#000000' }
        };

        // --- Preferences ---
        const PREF_KEY = 'webssh.pref.v1';
        const PREF_DEFAULTS = { 
            useCustomMenu: true,
            copyOnSelect: false, 
            enablePicPreview: true, 
            detectUrls: true, 
            urlClickAction: 'overlay', 
            fontFace: 'Consolas, "Courier New", monospace', 
            fontSize: 14,
            colorScheme: 'ibm5153'
        };
        function loadPrefs() { try { return { ...PREF_DEFAULTS, ...JSON.parse(localStorage.getItem(PREF_KEY)) }; } catch (e) { return { ...PREF_DEFAULTS }; } }
        function savePrefs(p) { localStorage.setItem(PREF_KEY, JSON.stringify(p)); }
        let prefs = loadPrefs();

        // --- Clipboard Helper ---
        function copyToClipboard(text) {
            if (!text) return;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
            } else { fallbackCopy(text); }
        }
        function fallbackCopy(text) {
            const ta = document.createElement("textarea");
            ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
            document.body.appendChild(ta); ta.select();
            try { document.execCommand('copy'); } catch (e) {}
            document.body.removeChild(ta);
        }

        // --- Loader Logic ---
        let startTime = Date.now();
        const timerInterval = setInterval(() => { document.getElementById('loader-timer').innerText = ((Date.now() - startTime) / 1000).toFixed(1) + 's'; }, 100);

        function loadScript(id, localUrl, cdnUrl) {
            return new Promise((resolve) => {
                const script = document.createElement('script');
                script.src = localUrl; script.onload = () => resolve(true);
                script.onerror = () => {
                    script.remove();
                    const cdn = document.createElement('script');
                    cdn.src = cdnUrl; cdn.onload = () => resolve(true); cdn.onerror = () => resolve(false);
                    document.head.appendChild(cdn);
                };
                document.head.appendChild(script);
            });
        }

        async function initApp() {
            await loadScript('xterm', '/static/js/xterm.js', 'https://cdn.jsdelivr.net/npm/xterm@5.1.0/lib/xterm.js');
            document.getElementById('progress-bar').style.width = '25%';
            await loadScript('socketio', '/static/js/socket.io.min.js', 'https://cdn.socket.io/4.5.4/socket.io.min.js');
            document.getElementById('progress-bar').style.width = '50%';
            await loadScript('fit', '/static/js/xterm-addon-fit.js', 'https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js');
            document.getElementById('progress-bar').style.width = '75%';
            await loadScript('links', '/static/js/xterm-addon-web-links.js', 'https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js');
            document.getElementById('progress-bar').style.width = '100%';

            clearInterval(timerInterval);
            document.getElementById('loader-screen').style.display = 'none';
            document.getElementById('terminal').style.display = 'block';
            document.getElementById('controls').style.display = 'block';
            startMainLogic();
        }

        function startMainLogic() {
            const terminalContainer = document.getElementById('terminal');
            const statusEl = document.getElementById('socketStatus');
            const errorEl = document.getElementById('errorBox');
            let connectedAt = null;

            function formatUptime(secs) {
                const d = Math.floor(secs / 86400), h = Math.floor((secs % 86400) / 3600), m = Math.floor((secs % 3600) / 60), s = secs % 60;
                const hms = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                return d > 0 ? `${d}d ${hms}` : hms;
            }
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock-display').innerText = now.toLocaleString();
                if (connectedAt) document.getElementById('uptime-display').innerText = formatUptime(Math.floor((now - connectedAt) / 1000));
            }, 1000);

            const term = new Terminal({
                cursorBlink: true,
                fontFamily: prefs.fontFace,
                fontSize: prefs.fontSize,
                theme: SCHEMES[prefs.colorScheme] || SCHEMES.vintage
            });
            let fitAddon = (typeof FitAddon !== 'undefined') ? new FitAddon.FitAddon() : null;
            if (fitAddon) term.loadAddon(fitAddon);
            term.open(terminalContainer);

            let webLinksAddon = null;
            function applyDetectUrls() {
                if (webLinksAddon) { webLinksAddon.dispose(); webLinksAddon = null; }
                if (prefs.detectUrls && typeof WebLinksAddon !== 'undefined') {
                    webLinksAddon = new WebLinksAddon.WebLinksAddon((e, uri) => {
                        const ctrl = e.ctrlKey || e.metaKey;
                        if ((prefs.urlClickAction === 'overlay') !== ctrl) openUrlInOverlay(uri);
                        else window.open(uri, '_blank');
                    });
                    term.loadAddon(webLinksAddon);
                }
            }
            applyDetectUrls();

            const socket = io({ query: { token: (new URLSearchParams(window.location.search)).get('token') || "{{ token }}" }, reconnectionAttempts: 5 });
            socket.on('connect', () => { statusEl.innerText = "Connected"; statusEl.style.color = "#34c759"; });
            socket.on('disconnect', (r) => { 
                statusEl.innerText = "Disconnected (" + r + ")"; 
                statusEl.style.color = "#ff9f0a"; 
                document.getElementById('controls').style.display = 'block'; 
                document.getElementById('connectBtn').innerText = "Connect to SSH";
                document.getElementById('connectBtn').disabled = false;
                connectedAt = null; 
                document.getElementById('uptime-section').style.display = 'none'; 
            });

            function resize() { if (fitAddon) fitAddon.fit(); if (socket.connected) socket.emit('resize', { cols: term.cols, rows: term.rows }); }
            window.addEventListener('resize', resize);

            const doConnect = () => {
                errorEl.style.display = 'none';
                socket.emit('start_ssh', { 
                    host: document.getElementById('host').value, 
                    port: document.getElementById('port').value, 
                    username: document.getElementById('username').value, 
                    password: document.getElementById('password').value 
                });
                document.getElementById('connectBtn').innerText = "Connecting..."; document.getElementById('connectBtn').disabled = true;
            };
            document.getElementById('connectBtn').onclick = doConnect;
            ['host', 'port', 'username', 'password'].forEach(id => {
                document.getElementById(id).addEventListener('keydown', (e) => { if (e.key === 'Enter') doConnect(); });
            });

            term.onData(data => { if (socket.connected) socket.emit('ssh_input', { data }); });
            socket.on('ssh_output', data => {
                if (data.data.includes('[ERROR]')) {
                    errorEl.innerText = data.data.replace('[ERROR]', '').trim(); errorEl.style.display = 'block';
                    document.getElementById('connectBtn').innerText = "Connect to SSH"; document.getElementById('connectBtn').disabled = false;
                } else {
                    if (document.getElementById('controls').style.display !== 'none') {
                        document.getElementById('controls').style.display = 'none'; connectedAt = new Date(); document.getElementById('uptime-section').style.display = 'inline'; resize(); setTimeout(() => term.focus(), 100);
                    }
                    term.write(data.data);
                }
            });

            const contextMenu = document.getElementById('context-menu');
            const urlOverlay = document.getElementById('url-overlay');
            const openOption = document.getElementById('open-overlay-option');
            const searchOption = document.getElementById('search-google-option');
            const menuSepSel = document.getElementById('menu-sep-sel');
            const IMAGE_EXTENSIONS = ['.jpg', '.jpeg', '.png', '.gif', '.webp', '.svg', '.bmp'];

            function showContextMenu(x, y) {
                const sel = term.getSelection().trim(); const hasSel = !!sel;
                openOption.classList.toggle('hidden', !hasSel); searchOption.classList.toggle('hidden', !hasSel); menuSepSel.style.display = hasSel ? 'block' : 'none';
                if (hasSel) { openOption.dataset.url = sel; searchOption.dataset.query = sel; }
                contextMenu.style.left = `${x}px`; contextMenu.style.top = `${y}px`; contextMenu.style.display = 'block';
                requestAnimationFrame(() => { const r = contextMenu.getBoundingClientRect(); if (r.right > window.innerWidth) contextMenu.style.left = `${x - r.width}px`; if (r.bottom > window.innerHeight) contextMenu.style.top = `${y - r.height}px`; });
            }
            window.addEventListener('contextmenu', (e) => { 
                if (e.shiftKey || !prefs.useCustomMenu) return; 
                e.preventDefault(); 
                setTimeout(() => showContextMenu(e.clientX, e.clientY), 50); 
            });
            window.addEventListener('mousedown', (e) => { if (!contextMenu.contains(e.target)) contextMenu.style.display = 'none'; });
            
            window.addEventListener('mouseup', (e) => {
                if (e.button === 0) {
                    setTimeout(() => {
                        const sel = term.getSelection().trim();
                        if (prefs.copyOnSelect && sel) { copyToClipboard(sel); term.clearSelection(); }
                    }, 50);
                }
            });

            document.getElementById('native-menu-option').onclick = (e) => {
                e.stopPropagation();
                contextMenu.style.display = 'none';
                prefs.useCustomMenu = false;
                savePrefs(prefs);
                alert("Custom menu disabled. Now Right-Click will show browser menu.\n\nTo restore, use the ⚙️ icon in status bar or Press Shift + Right-Click.");
            };

            function openUrlInOverlay(url) {
                if (!url.startsWith('http')) url = 'https://' + url;
                document.getElementById('external-link').onclick = () => window.open(url, '_blank');
                document.getElementById('overlay-fallback').style.display = 'none';
                const isImg = IMAGE_EXTENSIONS.some(ext => url.toLowerCase().includes(ext));
                if (isImg && !prefs.enablePicPreview) { window.open(url, '_blank'); return; }
                document.getElementById('overlay-iframe').style.display = isImg ? 'none' : 'block';
                document.getElementById('overlay-img').style.display = isImg ? 'block' : 'none';
                if (isImg) document.getElementById('overlay-img').src = url; 
                else {
                    document.getElementById('overlay-iframe').src = url;
                    let timer = setTimeout(() => { if (document.getElementById('overlay-iframe').style.display !== 'none') { document.getElementById('overlay-iframe').style.display = 'none'; document.getElementById('overlay-fallback').style.display = 'flex'; } }, 8000);
                    document.getElementById('overlay-iframe').onload = () => clearTimeout(timer);
                }
                urlOverlay.style.display = 'flex';
            }

            openOption.onclick = () => openUrlInOverlay(openOption.dataset.url);
            searchOption.onclick = () => window.open(`https://www.google.com/search?q=${encodeURIComponent(searchOption.dataset.query)}`, '_blank');
            document.getElementById('paste-option').onclick = async (e) => {
                e.stopPropagation(); contextMenu.style.display = 'none';
                let text = "";
                try {
                    if (navigator.clipboard && navigator.clipboard.readText) text = await navigator.clipboard.readText();
                    else text = prompt("Paste text here:");
                    if (text && socket.connected) socket.emit('ssh_input', { data: text });
                } catch(err) {}
            };
            document.getElementById('close-overlay').onclick = (e) => { e.stopPropagation(); urlOverlay.style.display = 'none'; document.getElementById('overlay-iframe').src = 'about:blank'; setTimeout(() => term.focus(), 100); };
            
            const header = document.getElementById('overlay-header'), shield = document.getElementById('overlay-shield');
            let isDragging = false, isResizing = false, currentResizer = null, startX, startY, startWidth, startHeight, startLeft, startTop;
            header.onmousedown = (e) => { if (e.target.closest('.header-btn')) return; isDragging = true; shield.style.display = 'block'; startX = e.clientX; startY = e.clientY; startLeft = urlOverlay.offsetLeft; startTop = urlOverlay.offsetTop; urlOverlay.style.right = 'auto'; };
            document.querySelectorAll('.resizer').forEach(r => {
                r.onmousedown = (e) => { isResizing = true; currentResizer = r; shield.style.display = 'block'; startX = e.clientX; startY = e.clientY; startWidth = urlOverlay.clientWidth; startHeight = urlOverlay.clientHeight; startLeft = urlOverlay.offsetLeft; startTop = urlOverlay.offsetTop; urlOverlay.style.right = 'auto'; e.preventDefault(); };
            });
            window.onmousemove = (e) => {
                if (isDragging) { urlOverlay.style.left = `${startLeft + (e.clientX - startX)}px`; urlOverlay.style.top = `${startTop + (e.clientY - startY)}px`; }
                else if (isResizing && currentResizer) {
                    const dx = e.clientX - startX, dy = e.clientY - startY, cls = currentResizer.className;
                    if (cls.includes('e')) urlOverlay.style.width = `${startWidth + dx}px`;
                    if (cls.includes('w')) { urlOverlay.style.width = `${startWidth - dx}px`; urlOverlay.style.left = `${startLeft + dx}px`; }
                    if (cls.includes('s')) urlOverlay.style.height = `${startHeight + dy}px`;
                    if (cls.includes('n')) { urlOverlay.style.height = `${startHeight - dy}px`; urlOverlay.style.top = `${startTop + dy}px`; }
                }
            };
            window.onmouseup = () => { isDragging = false; isResizing = false; currentResizer = null; shield.style.display = 'none'; };

            document.getElementById('pip-option').addEventListener('click', async () => {
                if (!window.documentPictureInPicture) return alert("PiP not supported.");
                const pipWindow = await window.documentPictureInPicture.requestWindow({ width: 800, height: 480 });
                pipWindow.document.body.append(terminalContainer);
                [...document.styleSheets].forEach((s) => {
                    try { const style = document.createElement('style'); style.textContent = [...s.cssRules].map((r) => r.cssText).join(''); pipWindow.document.head.appendChild(style); }
                    catch (e) { const l = document.createElement('link'); l.rel = 'stylesheet'; l.href = s.href; pipWindow.document.head.appendChild(l); }
                });
                pipWindow.addEventListener('resize', () => { if (fitAddon) fitAddon.fit(); });
                pipWindow.addEventListener('pagehide', () => { document.body.insertBefore(terminalContainer, document.getElementById('status-bar')); resize(); });
            });

            const settingsModal = document.getElementById('settings-modal');
            const openSettings = () => {
                document.getElementById('pref-useCustomMenu').checked = prefs.useCustomMenu;
                document.getElementById('pref-copyOnSelect').checked = prefs.copyOnSelect;
                document.getElementById('pref-enablePicPreview').checked = prefs.enablePicPreview;
                document.getElementById('pref-detectUrls').checked = prefs.detectUrls;
                document.getElementById('pref-urlClickAction').value = prefs.urlClickAction;
                document.getElementById('pref-colorScheme').value = prefs.colorScheme;
                document.getElementById('pref-fontFace').value = prefs.fontFace;
                document.getElementById('pref-fontSize').value = prefs.fontSize;
                settingsModal.classList.add('open');
            };
            document.getElementById('settings-option').onclick = openSettings;
            document.getElementById('quick-settings').onclick = openSettings;
            document.getElementById('settings-close').onclick = () => settingsModal.classList.remove('open');
            document.querySelectorAll('.settings-nav-item').forEach(item => {
                item.onclick = () => {
                    document.querySelectorAll('.settings-nav-item').forEach(i => i.classList.remove('active'));
                    document.querySelectorAll('.settings-tab').forEach(t => t.classList.remove('active'));
                    item.classList.add('active'); document.getElementById('tab-' + item.dataset.tab).classList.add('active');
                };
            });
            document.getElementById('settings-save').onclick = () => {
                prefs.useCustomMenu = document.getElementById('pref-useCustomMenu').checked;
                prefs.copyOnSelect = document.getElementById('pref-copyOnSelect').checked;
                prefs.enablePicPreview = document.getElementById('pref-enablePicPreview').checked;
                prefs.detectUrls = document.getElementById('pref-detectUrls').checked;
                prefs.urlClickAction = document.getElementById('pref-urlClickAction').value;
                prefs.colorScheme = document.getElementById('pref-colorScheme').value;
                prefs.fontFace = document.getElementById('pref-fontFace').value;
                prefs.fontSize = parseInt(document.getElementById('pref-fontSize').value);
                savePrefs(prefs);
                term.options.fontFamily = prefs.fontFace; 
                term.options.fontSize = prefs.fontSize;
                term.options.theme = SCHEMES[prefs.colorScheme] || SCHEMES.vintage;
                resize(); applyDetectUrls(); settingsModal.classList.remove('open');
            };
            document.getElementById('settings-reset').onclick = () => { prefs = { ...PREF_DEFAULTS }; savePrefs(prefs); location.reload(); };
            setTimeout(resize, 500);
        }
        initApp();
    </script>
</body>
</html>
